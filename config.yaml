# 价格监控配置
# 目标网站域名不写在仓库里，而是通过环境变量 TARGET_BASE_URL 注入
# （GitHub Secrets 中配置，例如 https://www.example.com）。
# 下方所有以 / 开头的 url/api_url 运行时会自动拼上该域名。

request:
  timeout: 30
  # 两次抓取之间的间隔（秒），避免请求过快
  delay_seconds: 3
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"

alert:
  # 涨跌幅（百分比）达到该值就推送，例如 10 表示 ±10%
  percent_threshold: 10
  # 绝对变动金额达到该值也推送；0 表示不启用
  absolute_threshold: 0
  # 新收录的商品（第一次抓到）是否推送
  notify_on_new: false

# 每个页面直接对接网站的 JSON 接口（api_url），比解析 HTML 稳定。
# url 仅用于推送消息里的链接展示。
# max_pages: 最多翻页数（会自动按接口返回的 totalPages 截断）。
pages:
  - name: "手机 iPhone"
    url: "/mobile?category=RGNg976kptBN7UjF&page=1&size=24&isImpo=false&isCampaign=false&isImpoCate=false"
    api_url: "/api/keitai/listPage?accCode=&page=1&size=24&keyword=&isImpo=false&isCampaign=false&cateCode=RGNg976kptBN7UjF&kbNames=&cateName=&isImpoCate=false"
    max_pages: 20
  - name: "家电"
    url: "/electricAppliance?category=R0000002&page=1&size=24&isImpo=true&isCampaign=false"
    api_url: "/api/goods/listPage?accCode=&page=1&size=24&keyword=&isImpo=true&isCampaign=false&cateCode=R0000002&kbNames=&cateName="
    max_pages: 20
  - name: "宝可梦卡片"
    url: "/tradeCards?category=IIzyMdayU5wp7T4G&page=1&size=24&isImpo=false&isCampaign=false"
    api_url: "/api/goods/listPage?accCode=&page=1&size=24&keyword=&isImpo=false&isCampaign=false&cateCode=IIzyMdayU5wp7T4G&kbNames=&cateName="
    max_pages: 20

  # 也可以用 HTML 解析模式（不填 api_url 时生效）：
  # - name: "某页面"
  #   url: "/..."
  #   render: true          # SPA 页面需浏览器渲染
  #   item_selector: ""     # 留空用通用启发式，或填 CSS 选择器
